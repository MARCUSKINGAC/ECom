<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding for special characters -->
  <meta charset="UTF-8">
  <!-- Viewport meta tag for responsive design on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy - Products</title>
  <!-- Link to our external CSS stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ==========================================
       NAVIGATION BAR
       Same as homepage for consistent navigation
       ========================================== -->
  <header class="navbar">
    <div class="container">
      <h1 class="logo">ShopEasy</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <!-- 'active' class highlights current page -->
          <li><a href="products.html" class="active">Products</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ==========================================
       MAIN CONTENT
       Contains filters and product listing
       ========================================== -->
  <main class="container">
    <!-- Page Title -->
    <h1>Our Products</h1>
    
    <!-- ==========================================
         FILTERS SECTION
         Allows users to filter and sort products
         ========================================== -->
    <section class="filters">
      <!-- Category Filter Dropdown -->
      <div class="filter-group">
        <label for="category-filter">Category:</label>
        <select id="category-filter">
          <option value="all">All Categories</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
          <option value="accessories">Accessories</option>
          <option value="sports">Sports & Games</option>
          <option value="food">Food & Beverages</option>
          <option value="books">Books</option>
        </select>
      </div>
      
      <!-- Price Range Filter Slider -->
      <div class="filter-group">
        <label for="price-filter">
          Max Price: $<span id="price-value">1000</span>
        </label>
        <!-- Range input creates a slider -->
        <input type="range" id="price-filter" min="0" max="1000" value="1000" step="10">
      </div>
      
      <!-- Sort Options Dropdown -->
      <div class="filter-group">
        <label for="sort-filter">Sort by:</label>
        <select id="sort-filter">
          <option value="default">Default</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="name">Name: A-Z</option>
        </select>
      </div>
    </section>
    
    <!-- ==========================================
         PRODUCT GRID
         Products are dynamically inserted here by JavaScript
         ========================================== -->
    <section class="product-grid" id="product-container">
      <!-- JavaScript will render product cards here -->
    </section>
    
    <!-- ==========================================
         NO RESULTS MESSAGE
         Shown when filters match no products
         Hidden by default with 'hidden' class
         ========================================== -->
    <p id="no-results" class="no-results hidden">
      No products match your filters. Try adjusting your search criteria.
    </p>
  </main>

  <!-- ==========================================
       FOOTER
       Copyright information
       ========================================== -->
  <footer class="footer">
    <p>&copy; 2026 ShopEasy. All rights reserved.</p>
  </footer>

  <!-- ==========================================
       JAVASCRIPT FILES
       data.js must load before products.js
       ========================================== -->
  <script src="js/data.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
